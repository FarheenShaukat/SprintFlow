        }

        }

    body {

    }

  </head>
<body class="font-body-md text-on-surface bg-background min-h-screen flex items-center justify-center p-6">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md">
<!-- Logo/Branding Anchor -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-container text-on-primary mb-4">
<span class="material-symbols-outlined text-3xl" data-icon="rocket_launch">rocket_launch</span>
</div>
<h1 class="font-display text-display text-primary tracking-tight">Zenith PM</h1>
<p class="font-body-md text-on-surface-variant mt-2">Precision project management for high-velocity teams.</p>
</div>
<!-- Login Card -->
<div class="login-card bg-surface border border-outline-variant/30 rounded-xl p-8 backdrop-blur-sm">
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="email">Email Address</label>
<div class="relative group glow-focus rounded-lg transition-all duration-200">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-0 transition-all placeholder:text-on-surface-variant/40" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group glow-focus rounded-lg transition-all duration-200">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-10 py-3 bg-white border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-0 transition-all placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary font-body-lg font-semibold py-3 px-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface px-4 text-on-surface-variant/60 font-label-md">Or continue with</span>
</div>
</div>
<!-- Social Login / OAuth -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-outline-variant rounded-lg py-2.5 px-4 font-label-md text-on-surface hover:bg-surface-container transition-colors">
<img class="w-4 h-4" data-alt="A clean, flat vector logo of Google in its signature four colors, rendered in a high-resolution, minimalist professional style suitable for a corporate authentication screen. The lighting is neutral and even, focusing on the brand's iconic geometric letter G shape." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTyRF3bG0y0R7A5uzBM6V62CQWfBc6H28Q3WOSVa5if-xRMAZgpoZ2K9Pcn71eqOBOjgnkHRn29ht_jD0iXHNrqV6ZJUujASVvaw7AVsVXwd0WYMygUNedu33WT2IxT2lcTeYXYg-KKIXv5OnYCQ4H00e21zdt6HL9UX4y_AsXys8rGXusn6xsjcJRqW5xItKJbtxK4tXl2y_FXsS8pTin5CM8d4Xfo_EtTmXVEQZDi-F2W1BvP1xUOpxbRuwHQNiiEpuNozm_-Nri"/>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 border border-outline-variant rounded-lg py-2.5 px-4 font-label-md text-on-surface hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="terminal">terminal</span>
                    SSO
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center mt-8 font-body-md text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-semibold hover:underline transition-all" href="#">Register</a>
</p>
<!-- Trust Badges -->
<div class="mt-12 flex justify-center items-center gap-8 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="font-label-md text-[10px] uppercase tracking-widest">SOC2 Type II</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="security">security</span>
<span class="font-label-md text-[10px] uppercase tracking-widest">AES-256</span>
</div>
</div>
</main>
<!-- Micro-interaction for password toggle -->
<script>
        const passInput = document.getElementById('password');
        const toggleBtn = passInput.nextElementSibling;
        
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        // Subtle parallax effect on background circles
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const blur1 = document.querySelector('.blur-3xl:nth-child(1)');
            const blur2 = document.querySelector('.blur-3xl:nth-child(2)');
            
            blur1.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            blur2.style.transform = `translate(-${x * 30}px, -${y * 30}px)`;
        });
    </script>
</body></html>
